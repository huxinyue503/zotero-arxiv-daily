services:
  zotero-arxiv-daily:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/zotero-arxiv-daily:latest
    container_name: zotero-arxiv-daily
    network_mode: bridge
    restart: unless-stopped
    environment:
      # 必填参数
      - ZOTERO_ID=1234567
      - ZOTERO_KEY=AbCdEfGhIjKlMnOpQrStUvWx
      - SMTP_SERVER=smtp.example.com
      - SMTP_PORT=465
      - SENDER=your_email@example.com
      - SENDER_PASSWORD=your_email_password
      - RECEIVER=receiver_email@example.com

      # 可选参数
      - ZOTERO_IGNORE=already_read_papers
      - ARXIV_QUERY=cs.AI+cs.CV+cs.LG+cs.CL
      - SEND_EMPTY=False
      - MAX_PAPER_NUM=5
      - LANGUAGE=English
      
      # 新增配置
      - HF_ENDPOINT=https://hf-mirror.com
      # - TZ=Asia/Shanghai
      # - http_proxy=http://proxy.example.com:8080
      # - https_proxy=http://proxy.example.com:8080

    volumes:
      - ./logs:/var/log/cron  # 日志持久化到宿主机 logs 目录
      - /etc/localtime:/etc/localtime:ro  # 同步主机时区

    # 关键修复点：使用 printf 确保换行，修正 cron 运行逻辑
    command: >
      bash -c "
      rm -f /var/run/crond.pid /var/run/cron.pid && 
      printenv | grep -v 'no_proxy' >> /etc/environment && 
      printf '0 8 * * * root cd /app && /usr/local/bin/uv run main.py >> /var/log/cron/arxiv.log 2>&1\n' > /etc/cron.d/zotero-job && 
      chmod 0644 /etc/cron.d/zotero-job && 
      touch /var/log/cron/arxiv.log && 
      cron && 
      tail -f /var/log/cron/arxiv.log
      "
